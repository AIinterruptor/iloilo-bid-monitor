name: Scrape bid postings

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        run: python scrape.py

      - name: Commit updated postings if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/data/postings.json; then
            echo "No new postings, nothing to commit."
          else
            git add docs/data/postings.json
            git commit -m "chore: update postings.json [automated scrape]"
            git push
          fi
